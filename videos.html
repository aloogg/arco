<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Multimedia 2026</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Segoe+UI:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/videos.css"> </head>
<body>

    <header class="desktop-header">
        <div class="logo">
    <img src="assets/Imagenes/Goool.png" alt="Logo ARCO">
    <span>ARCO</span>
        </div>
        <nav class="desktop-nav">
            <a href="index.html">Inicio</a>
            <!-- <a href="videos.html">Galería</a> -->
            <a href="trivia.html"> Trivia</a>
            <a href="estadisticas.html">Estadística</a>
        </nav>
    </header>

    <svg style="display: none;">
        <defs>
            <filter id="pixelate" x="0%" y="0%" width="100%" height="100%">
                <feFlood x="2" y="2" height="2" width="2"/>
                <feComposite width="10" height="10"/>
                <feTile result="a"/>
                <feComposite in="SourceGraphic" in2="a" operator="in"/>
                <feMorphology operator="dilate" radius="2"/>
            </filter>

            <filter id="thermal">
                <feColorMatrix type="matrix" values="
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0    0    0    1 0" result="gray"/>
                <feComponentTransfer>
                    <feFuncR type="table" tableValues="0 0 1 1"/>
                    <feFuncG type="table" tableValues="0 1 1 0"/>
                    <feFuncB type="table" tableValues="1 0 0 0"/>
                </feComponentTransfer>
            </filter>
        </defs>
    </svg>

    <div class="media-container">
        
        <h1 class="page-title">Galería Mundial 2026</h1>
        <p class="subtitle">Selecciona un país para ver su contenido exclusivo</p>

        <div class="country-selector" id="countrySelector">
            </div>

        <div class="media-grid" id="mediaGrid">
            <div class="empty-state">Selecciona una bandera arriba 👆</div>
        </div>

    </div>

    <nav class="sticky-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i>Inicio</a>
        <a href="videos.html" style="color: var(--accent-gold);"><i class="fa-solid fa-play"></i>Videos</a>
        <a href="trivia.html"><i class="fa-solid fa-question"></i>Trivia</a>
    </nav>

    <script src="assets/js/videos.js"></script>

</body>
</html>
